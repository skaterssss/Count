<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telspel met Dieren</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="game-area">
            <h1>🐾 Telspel met Dieren</h1>

            <!-- Category selection screen -->
            <div id="categoryScreen">
                <p class="screen-subtitle">Kies een categorie:</p>
                <div id="categoryGrid"></div>
            </div>

            <!-- Game screen -->
            <div id="gameContent">
                <div class="animal-container">
                    <div class="animal-cover" id="animalCover"></div>
                    <div class="animal-image" id="animalImage"></div>
                </div>

                <div class="progress-container">
                    <div class="progress-bar" id="progressBar"></div>
                    <span class="progress-text" id="progressText">0 / 10</span>
                </div>

                <div class="target-display" id="targetDisplay">
                    Zoek: <span class="target-number" id="targetNumber">1</span>
                </div>

                <div class="numbers-grid" id="numbersGrid"></div>

                <div class="message" id="message"></div>

                <button class="reset-btn" id="resetBtn">🔄 Opnieuw Spelen</button>
                <button class="back-btn" id="backBtn">← Andere categorie</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
